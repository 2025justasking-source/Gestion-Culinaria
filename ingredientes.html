<html class="5" lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscar Ingredientes</title>

    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="cheff.css">

</head>

<body>

    <div class="contenedor">


        <header>
            <div class="perfil">


                <img src="chef.jpg" alt="Foto de perfil" class="foto-perfil">
                <span class="nombre-usuario">Nombre usuario</span>
            </div>

            <nav>
                <a href="#"><i class='bx bx-list-ul'></i> Mi perfil</a>

                <a href=busqueda.html><i class='bx bx-search-alt'></i> Ver recetas recientes</a>

                <a href="#"><i class='bx bx-message-rounded-dots'></i> Postear en el Foro</a>
            </nav>

        </header>

        <!-- SECCIÓN DE INGREDIENTES -->
        <section class="seccion-ingredientes">


            <!-- Botón para volver atrás -->
            <div class="volver">

                <a href="chef.html" class="btn-volver">

                    <i class='bx bx-arrow-back'></i> Volver
                </a>
            </div>

            <h2><i class='bx bxs-food-menu'></i> Lista de Ingredientes</h2>

            <!-- Buscador -->
            <div class="buscador">

                <input type="text" placeholder="Ingresar producto">
                <button><i class='bx bx-search'></i> Buscar</button>
            </div>

            <!-- Lista de ingredientes -->
            <div class="lista-ingredientes">


                <label class="item">
                    <input type="checkbox">
                    <span>Pan bimbo 24 unidades</span>
                    <span class="precio"> 2500</span>
                </label>

                <label class="item">
                    <input type="checkbox">
                    <span>Tomate 1kg</span>
                    <span class="precio">2000</span>
                </label>

                <label class="item">

                    <input type="checkbox">
                    <span>Lechuga 1 unidad</span>
                    <span class="precio"> 1500</span>

                </label>

                <label class="item">
                    <input type="checkbox">
                    <span>Queso 500g</span>
                    <span class="precio">3000</span>
                </label>

            </div>

            <!-- Total -->
            <div class="total">
                <span>Total:</span>
                <span class="total-precio"> 0</span>
            </div>

        </section>

        <!-- FOOTER -->
        <footer>
            <p><a href=chef.html class="link-inicio">Volver al inicio</a> / Derechos reservados</p>
        </footer>

    </div>

</body>

</html>
